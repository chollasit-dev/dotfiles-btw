###############
### WINDOWS ###
###############

# https://wiki.hyprland.org/Configuring/Window-Rules/

windowrule {
  name = windowrule-clipse
  match:class = clipse
  center = on
  float = on
  pin = on
  size = 622 652
}

windowrule {
  name = windowrule-style-xwayland
  match:xwayland = true
  border_color = rgba(74c7eceee) rgba(89b4faff) 45deg;
}

